version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: [redis_data:/data]

  backend:
    build: ./backend
    ports: ['4000:4000']
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on: [redis]
    volumes: [./backend:/app, /app/node_modules]

  frontend:
    build: ./frontend
    ports: ['3000:3000']
    env_file: ./frontend/.env.local
    depends_on: [backend]
    volumes: [./frontend:/app, /app/node_modules]

volumes:
  redis_data:
